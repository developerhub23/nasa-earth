<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NASA Earth Access</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* STAR FIELD (key fix here) */
.stars {
  position: fixed;
  width: 300%;   /* bigger area to avoid reset gap */
  height: 300%;
  will-change: transform; /* GPU acceleration */
  animation: drift 12s linear infinite; /* slower + smoother */
}

/* stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  opacity: 0.9;
}

/* SMOOTH LOOP (important) */
@keyframes drift {
  from { transform: translate3d(0, 0, 0); }
  to { transform: translate3d(-33.33%, -33.33%, 0); }
}

/* center UI */
#container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

h1 {
  font-size: 26px;
  font-weight: 400;
  margin-bottom: 40px;
  opacity: 0.85;
}

button {
  font-size: 20px;
  padding: 12px 26px;
  background: #0a84ff;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

/* countdown */
#count {
  font-size: 70px;
  margin-top: 30px;
  display: none;
  letter-spacing: 6px;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div id="container">
  <h1>Tap to enter real-time NASA Earth visualization</h1>
  <button onclick="start()">Enter</button>
  <div id="count"></div>
</div>

<script>
// better star distribution
const container = document.getElementById("stars");

for(let i=0;i<300;i++){
  let s = document.createElement("div");
  s.className = "star";

  let size = Math.random()*2 + 2;
  s.style.width = size + "px";
  s.style.height = size + "px";

  s.style.left = Math.random()*300 + "vw";
  s.style.top = Math.random()*300 + "vh";

  container.appendChild(s);
}

// sound
function beep(){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = 650;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),90);
}

// countdown
function start(){
  let c = document.getElementById("count");
  c.style.display = "block";

  let i = 3;

  let interval = setInterval(()=>{
    beep();
    c.innerText = i;

    if(i === 0){
      clearInterval(interval);

      setTimeout(()=>{
        window.location.href =
        "https://eyes.nasa.gov/apps/earth/#/vital-signs/visibleEarth/visible-earth";
      },500);
    }

    i--;
  },1000);
}
</script>

</body>
</html>
