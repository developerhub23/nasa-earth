<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f10" />
  <title>BPUT Exam Paper Leak 2026</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      width: 100%;
      overflow-x: hidden;
      background: #0f0f10;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(92vw, 420px);
      text-align: center;
      background: #151515;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 22px 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.35rem, 4.5vw, 2rem);
      line-height: 1.25;
    }

    .meme {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      margin: 0 auto 16px;
      background: #222;
    }

    h2 {
      margin: 0 0 10px;
      font-size: clamp(1.1rem, 4vw, 1.35rem);
    }

    p {
      margin: 8px 0;
      font-size: clamp(0.95rem, 3.4vw, 1rem);
      line-height: 1.5;
      color: #e7e7e7;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 14px 0 18px;
    }

    li {
      margin: 6px 0;
      font-size: clamp(0.95rem, 3.4vw, 1rem);
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #17b7d9;
      color: #fff;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.98rem;
      transition: transform 0.15s ease, background 0.15s ease;
      min-width: 140px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:hover {
      background: #11a3c0;
    }

    .small {
      font-size: 0.88rem;
      opacity: 0.85;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>🔥 BPUT Exam Paper Leak 2026 🔥</h1>

    <img
      class="meme"
      src="meme.jpg"
      alt="Funny meme"
    />

    <h2>Nothing is leaked 😄</h2>

    <p>Stop searching shortcuts and go study.</p>
    <p>But since you are here, use my website for:</p>

    <ul>
      <li>✅ Quick revision notes</li>
      <li>✅ MCQ quizzes</li>
      <li>✅ Subject summaries</li>
    </ul>

    <a class="btn" href="https://developerhub23.github.io/devops23/">
      Visit Website
    </a>

    <p class="small">This is just a prank page.</p>
  </main>
</body>
</html>
